server:
  addr: ":30083"
  mode: "debug"
  read_timeout_seconds: 10
  write_timeout_seconds: 10

log:
  level: "info"
  filename: "./logs/app.log"
  max_size: 100
  max_backups: 10
  max_age: 30
  compress: true
  console: true
  format: "json"

auth:
  enabled: false
  secret: "yjd8357"
  issuer: ""
  audience: ""
  token_ttl_seconds: 3600

provider:
  type: "tushare"  # "mock" or "tushare"

tushare:
  token: ""  # set via TUSHARE_TOKEN env var (takes precedence) or fill in directly
  base_url: "http://api.tushare.pro"
  timeout: 30
  indices:
    - symbol: "000001.SH"
      name: "上证指数"
    - symbol: "399001.SZ"
      name: "深证成指"
    - symbol: "399006.SZ"
      name: "创业板指"
    - symbol: "000688.SH"
      name: "科创50"
    - symbol: "000300.SH"
      name: "沪深300"
    - symbol: "000905.SH"
      name: "中证500"

calendar:
  cache_file: "data/trading_calendar.json"
  update_interval_days: 7
  lookback_months: 6
  lookahead_months: 6



collector:
  enabled: true
  interval_minutes: 5
  max_history_days: 30

anomaly:
  enabled: true
  rules:
    - type: price_change
      upper_threshold: 3.0
      lower_threshold: -2.0
      enabled: true
    - type: volume_spike
      lookback_days: 5
      spike_multiplier: 2.0
      enabled: true
    - type: consecutive
      days: 5
      enabled: true

webhook:
  enabled: false
  webhook_url: ""
  cooldown_minutes: 30
  retry_count: 3
  retry_interval_seconds: 30

persistence:
  enabled: true
  db_path: "data/market_history.db"
  max_days: 90
