server:
  addr: ":30083"
  mode: "debug"
  read_timeout_seconds: 10
  write_timeout_seconds: 10

log:
  level: "info"
  filename: "./logs/app.log"
  max_size: 100
  max_backups: 10
  max_age: 30
  compress: true
  console: true
  format: "json"

auth:
  enabled: false
  secret: "yjd8357"
  issuer: ""
  audience: ""
  token_ttl_seconds: 3600

provider:
  type: "tushare"  # "mock" or "tushare"

tushare:
  token: ""  # set via TUSHARE_TOKEN env var (takes precedence) or fill in directly
  base_url: "http://api.tushare.pro"
  timeout: 30
  indices:
    - symbol: "000001.SH"
      name: "上证指数"
    - symbol: "399001.SZ"
      name: "深证成指"
    - symbol: "399006.SZ"
      name: "创业板指"
    - symbol: "000688.SH"
      name: "科创50"
    - symbol: "000300.SH"
      name: "沪深300"
    - symbol: "000905.SH"
      name: "中证500"
